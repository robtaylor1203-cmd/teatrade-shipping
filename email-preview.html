<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Email Preview — TeaTrade Shipping</title>
<style>
  body { margin:0; padding:20px; background:#e0e0e0; font-family:Arial,sans-serif; }
  .preview-nav { max-width:600px; margin:0 auto 16px; display:flex; gap:8px; flex-wrap:wrap; }
  .preview-nav button { padding:8px 16px; border:1px solid #ccc; border-radius:6px; background:#fff; cursor:pointer; font-size:13px; font-weight:600; }
  .preview-nav button.active { background:#1a73e8; color:#fff; border-color:#1a73e8; }
  .preview-nav button:hover:not(.active) { background:#f1f3f4; }
  .preview-label { max-width:600px; margin:0 auto 12px; font-size:12px; color:#666; }
</style>
</head>
<body>

<div class="preview-label">Click a notification type to preview:</div>
<div class="preview-nav">
  <button class="active" onclick="show('status_change')">Status Update</button>
  <button onclick="show('delay')">Delay Alert</button>
  <button onclick="show('arrival')">Delivered</button>
  <button onclick="show('eta_change')">ETA Updated</button>
  <button onclick="show('eta_delay')">ETA Delayed</button>
</div>

<div id="email-frame"></div>

<script>
const types = {
  status_change: {
    bg: "#e8f0fe", fg: "#1a73e8", label: "Status Update",
    title: "MSKU9070323 — Status Update",
    message: "Status changed from pending to moving",
    status: "moving"
  },
  delay: {
    bg: "#fce8e6", fg: "#c5221f", label: "Delay Alert",
    title: "MSKU9070323 — Delay Alert",
    message: "Status changed from moving to delayed",
    status: "delayed"
  },
  arrival: {
    bg: "#e6f4ea", fg: "#137333", label: "Delivered",
    title: "MSKU9070323 — Delivered",
    message: "Container has arrived at Felixstowe, UK",
    status: "delivered"
  },
  eta_change: {
    bg: "#fef7e0", fg: "#b06000", label: "ETA Updated",
    title: "MSKU9070323 — ETA Updated",
    message: "Estimated arrival updated to 25/05/2026",
    status: "moving"
  },
  eta_delay: {
    bg: "#fce8e6", fg: "#c5221f", label: "Delay Alert",
    title: "MSKU9070323 — ETA Delayed",
    message: "Arrival pushed back to 02/06/2026 (was 25/05/2026)",
    status: "delayed"
  }
};

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function buildEmail(key) {
  const t = types[key];
  return `
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f0f0f0;">
<tr><td align="center" style="padding:32px 16px;">

<table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

<!-- Header -->
<tr>
<td style="background:#ffffff;padding:28px 32px 20px;border-bottom:1px solid #ebebeb;text-align:center;">
    <div style="font-size:28px;font-weight:500;color:#5f6368;letter-spacing:-0.5px;font-family:Arial,sans-serif;">Tea<span style="color:#202124;font-weight:700;">Trade</span></div>
    <div style="margin-top:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#1a73e8;">Shipping</div>
</td>
</tr>

<!-- Alert Badge -->
<tr>
<td style="padding:24px 32px 0;">
    <div style="display:inline-block;background:${t.bg};color:${t.fg};padding:6px 16px;border-radius:50px;font-size:12px;font-weight:600;letter-spacing:0.3px;">${t.label}</div>
</td>
</tr>

<!-- Body -->
<tr>
<td style="padding:20px 32px 24px;">
    <h2 style="margin:0 0 12px;font-size:20px;font-weight:700;color:#202124;line-height:1.3;">${esc(t.title)}</h2>
    <p style="margin:0 0 20px;font-size:15px;line-height:1.7;color:#3c4043;">${esc(t.message)}</p>

    <!-- Shipment Details -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:24px 0;">
      <tr><td style="background:#f8f9fa;border:1px solid #ebebeb;border-radius:8px;padding:16px 20px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
          <tr><td style="font-size:12px;color:#5f6368;text-transform:uppercase;letter-spacing:0.8px;font-weight:600;padding-bottom:8px;">Shipment Details</td></tr>
          <tr><td style="font-size:15px;font-weight:700;color:#202124;font-family:'Courier New',monospace;padding-bottom:6px;">MSKU9070323</td></tr>
          <tr><td style="font-size:14px;color:#3c4043;padding-bottom:4px;">Shanghai, China → Felixstowe, UK</td></tr>
          <tr><td style="font-size:14px;color:#3c4043;">ETA: <strong>25 May 2026</strong></td></tr>
          <tr><td style="padding-top:8px;"><span style="display:inline-block;background:${t.bg};color:${t.fg};padding:4px 14px;border-radius:50px;font-size:12px;font-weight:600;text-transform:capitalize;">${esc(t.status)}</span></td></tr>
        </table>
      </td></tr>
    </table>

    <!-- CTA Button -->
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
    <tr><td align="center" style="padding:16px 0 8px;">
        <a href="#" style="display:inline-block;background:#1a73e8;color:#ffffff;padding:14px 44px;border-radius:50px;text-decoration:none;font-weight:600;font-size:15px;letter-spacing:0.3px;box-shadow:0 2px 8px rgba(26,115,232,0.35);">
            View Dashboard
        </a>
    </td></tr>
    </table>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:24px 0 0;">
    <tr><td style="border-top:1px solid #ebebeb;"></td></tr>
    </table>

    <p style="margin:20px 0 0;font-size:13px;line-height:1.6;color:#9aa0a6;">
        This is an automated notification from TeaTrade Shipping. If you didn't request container tracking, you can safely ignore this email.
    </p>
</td>
</tr>

<!-- Footer -->
<tr>
<td style="padding:20px 32px;background:#f8f9fa;border-top:1px solid #ebebeb;text-align:center;">
    <p style="margin:0 0 6px;color:#5f6368;font-size:12px;line-height:1.5;">
        &copy; 2026 TeaTrade &middot; <a href="https://teatrade.co.uk" style="color:#1a73e8;text-decoration:none;">teatrade.co.uk</a>
    </p>
    <p style="margin:0;color:#999999;font-size:11px;line-height:1.5;">
        TeaTrade Shipping &middot; Container Tracking &amp; Logistics
    </p>
</td>
</tr>

</table>

</td></tr>
</table>`;
}

function show(key) {
  document.getElementById('email-frame').innerHTML = buildEmail(key);
  document.querySelectorAll('.preview-nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

show('status_change');
</script>
</body>
</html>
