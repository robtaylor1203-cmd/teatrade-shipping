<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; color: #202124; }

    /* ── Toolbar ── */
    .toolbar {
        position: sticky; top: 0; z-index: 100;
        background: #202124; color: #fff; padding: 16px 24px;
        display: flex; align-items: center; gap: 16px; flex-wrap: wrap;

    .toolbar h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap; }
    .toolbar h1 span { color: #5f6368; font-weight: 400; }
    .toolbar-field { display: flex; flex-direction: column; gap: 3px; }
    .toolbar-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #9aa0a6; }
    .toolbar-field input {
        background: #303134; border: 1px solid #5f6368; border-radius: 6px;
        color: #e8eaed; padding: 6px 12px; font-size: 13px; width: 220px;
        outline: none; transition: border-color 0.2s;
    }
    .toolbar-field input:focus { border-color: #1a73e8; }
    .toolbar-actions { margin-left: auto; display: flex; gap: 10px; }
    .btn {
        padding: 8px 20px; border: none; border-radius: 50px; font-size: 13px;
        font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
    }
    .btn-send { background: #1a73e8; color: #fff; }
    .btn-send:hover { background: #1558b0; box-shadow: 0 2px 8px rgba(26,115,232,0.4); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-send.sent { background: #34a853; }

    /* ── Preview area ── */
    .preview-wrapper {
        max-width: 640px; margin: 32px auto; padding: 0 16px 48px;
    }
    .preview-label {
        font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
        color: #5f6368; margin-bottom: 12px; font-weight: 600;
    }
    .subject-preview {
        background: #fff; border-radius: 8px 8px 0 0; padding: 14px 20px;
        border-bottom: 1px solid #ebebeb; font-size: 13px; color: #5f6368;
    }
    .subject-preview strong { color: #202124; }
    .email-frame {
        background: #fff; border-radius: 0 0 8px 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    .email-frame iframe {
        width: 100%; height: 900px; border: none; display: block;
    }

    /* ── Toast notification ── */
    .toast {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
        padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500;
        color: #fff; z-index: 9999; opacity: 0; transition: opacity 0.3s;
        box-shadow: 0 4px 16px rgba(0,0,0,0.25);

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Auth ──
async function initAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    handleSession(session);
    supabase.auth.onAuthStateChange((_event, session) => handleSession(session));
}

function handleSession(session) {
    currentSession = session;
    const bar = document.getElementById('auth-bar');
    const btn = document.getElementById('btn-send');
    if (session && ADMIN_EMAILS.includes(session.user.email)) {
        bar.className = 'auth-bar authed';
        bar.style.display = 'block';
        bar.textContent = `Signed in as ${session.user.email} ✓`;
        btn.disabled = false;
    } else if (session) {
        bar.style.display = 'block';
        bar.className = 'auth-bar';
        bar.innerHTML = `Signed in as ${session.user.email} — admin access required to send.`;
        btn.disabled = true;
    } else {
        bar.style.display = 'block';
        bar.className = 'auth-bar';
        bar.innerHTML = 'Sign in required to send emails. <a onclick="window._signIn()">Sign in with Google</a>';
        btn.disabled = true;
    }
}

window._signIn = async function() {
    await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href }
    });
};

// ── Toast ──
function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 4000);
}

// ── Send ──
window.sendEmail = async function() {
    const recipientEmail = document.getElementById('recipient-email').value.trim();
    const estateName = document.getElementById('estate-name').value.trim();
    if (!recipientEmail) { showToast('Please enter a recipient email address.', 'error'); return; }
    if (!estateName) { showToast('Please enter an estate name.', 'error'); return; }
    if (!currentSession) { showToast('Please sign in first.', 'error'); return; }

    const btn = document.getElementById('btn-send');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/send-outreach-email`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${currentSession.access_token}`,
                'apikey': SUPABASE_ANON_KEY,
            },
            body: JSON.stringify({
                to: recipientEmail,
                subject: getSubjectLine(),
                html: getEmailHTML(),
            }),
        });
        const result = await res.json();
        console.log('Send response:', res.status, result);
        if (!res.ok) throw new Error(result.error || `HTTP ${res.status}`);
        btn.innerHTML = '&#10003; Sent!';
        btn.classList.add('sent');
        showToast(`Email sent to ${recipientEmail}`);
        setTimeout(() => { btn.innerHTML = '&#9993; Send Email'; btn.classList.remove('sent'); btn.disabled = false; }, 3000);
    } catch (err) {
        showToast(err.message, 'error');
        btn.innerHTML = '&#9993; Send Email';
        btn.disabled = false;
    }
};

function escHTML(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function getSubjectLine() {
    const name = document.getElementById('estate-name').value || '[Estate Name]';
    return `${name} — Your estate has a profile on TeaTrade`;
}

function updatePreview() {
    const iframe = document.getElementById('email-preview');

    doc.write(getEmailHTML());
    doc.close();
    document.getElementById('subject-display').textContent = getSubjectLine();
}

// Initial render
